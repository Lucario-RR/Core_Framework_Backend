openapi: 3.1.0
jsonSchemaDialect: https://json-schema.org/draft/2020-12/schema
info:
  title: Core User Management API
  version: 1.0.0-draft
  summary: Reusable OpenAPI 3.1 contract for account lifecycle, authentication, user profile management, MFA, passkeys, admin user operations, and privacy preferences.
  description: |
    Canonical OpenAPI 3.1 contract for the reusable core user-management layer in this repository.

    This spec intentionally excludes the PriceTracker business-domain APIs such as catalog, shops, prices,
    purchases, comparisons, watchlists, alerts, and moderation of price submissions.

    The retained surface is limited to reusable platform concerns:

    - registration, login, logout, refresh, password reset, and MFA completion
    - current-user profile, avatar attachment, and contact management
    - passkeys, TOTP MFA, recovery codes, and security summary
    - account-owned private file handling needed by the core, such as avatars or export packages
    - admin user management and system settings
    - legal document discovery, privacy consent capture, and cookie preferences

    Contract conventions:

    - IDs use `format: uuid`
    - timestamps use `format: date-time` in UTC
    - default currency uses ISO 4217 alpha-3 codes
    - response bodies use `camelCase`
    - successful responses use `{ data, meta }`
    - error responses use `{ error }` and include `urgencyLevel` on a 1-9 scale
    - request DTOs reject unknown fields unless explicitly stated otherwise
servers:
  - url: https://api.example.com/api/v1
    description: Production
  - url: http://localhost:11451/api/v1
    description: Local development
tags:
  - name: Health
    description: Versioned service availability checks for load balancers, monitors, and local smoke tests.
  - name: Auth
    description: Account registration, login, refresh, logout, password reset, and login-time MFA flows.
  - name: Users
    description: Signed-in user profile, avatar attachment, and current-account summary endpoints.
  - name: Files
    description: Private file upload and download flows for core account-owned files such as avatars and export packages.
  - name: IdentitySecurity
    description: MFA, passkeys, emails, phones, sessions, and other account security operations.
  - name: Privacy
    description: Legal document discovery, privacy consent recording, and cookie preference management.
  - name: AdminUsers
    description: Admin-only user listing, creation, updates, and bulk account lifecycle actions.
  - name: AdminSettings
    description: Admin-only overview and system settings management for the reusable core.
  - name: AdminSecurity
    description: Admin-only security-event, audit-log, session, and role-management endpoints.
paths:
  /health:
    get:
      tags:
        - Health
      operationId: healthCheck
      summary: Check service health
      description: Versioned unauthenticated endpoint that returns a small acknowledgement when the HTTP server is alive.
      security: []
      responses:
        '200':
          description: Server is alive and able to return JSON responses
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcknowledgementEnvelope'
              example:
                data:
                  status: ok
                  message: service healthy
                meta:
                  requestId: req_01HZZZZZZZZZZ
                  nextCursor: null
  /auth/register:
    post:
      tags:
        - Auth
      operationId: register
      summary: Register a new user account
      description: Create a standard user account, optionally consuming an invitation code for invite-only registration and role assignment, capture required legal document acceptances, and issue an authenticated session.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            examples:
              default:
                value:
                  username: alex
                  email: alex@example.com
                  password: StrongPassword!234
                  displayName: Alex
                  primaryPhone: '+447700900123'
                  invitationCode: null
                  acceptedLegalDocuments:
                    - documentKey: terms_of_service
                      version: '2026-04-01'
                    - documentKey: privacy_policy
                      version: '2026-04-01'
      responses:
        '201':
          description: Account created and authenticated session issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSessionEnvelope'
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          $ref: '#/components/responses/Conflict'
  /auth/register-admin:
    post:
      tags:
        - Auth
      operationId: registerAdminBootstrap
      summary: Register an initial admin account
      description: Setup-only bootstrap route. Keep it behind a deployment flag and disable it outside controlled setup flows.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Admin account created and authenticated session issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSessionEnvelope'
        '400':
          $ref: '#/components/responses/ValidationError'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
  /auth/login:
    post:
      tags:
        - Auth
      operationId: login
      summary: Authenticate with username, email, or phone and password
      description: Authenticate a user with the preferred login field, which can contain a username, email address, or login-enabled phone number. If the account already has an active confirmed TOTP factor, the server returns an MFA challenge instead of a session. Policy-only MFA enrollment requirements do not block login; they are returned on successful sessions as user.security.mfaRequired so clients can show a skippable enrollment prompt.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              default:
                value:
                  login: alex@example.com
                  password: StrongPassword!234
                  rememberMe: true
      responses:
        '200':
          description: Authenticated session returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSessionEnvelope'
        '202':
          description: Existing TOTP factor must be verified before a session can be issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MfaChallengeEnvelope'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /auth/refresh:
    post:
      tags:
        - Auth
      operationId: refreshSession
      summary: Refresh an access token
      description: Renew the short-lived access token using the current refresh cookie and CSRF token.
      security:
        - refreshTokenCookie: []
          csrfHeader: []
      responses:
        '200':
          description: Access token refreshed and cookie renewed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSessionEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /auth/logout:
    post:
      tags:
        - Auth
      operationId: logout
      summary: Invalidate the current session
      description: Invalidate the active session and expire the session cookie when one exists.
      security:
        - bearerAuth: []
        - refreshTokenCookie: []
          csrfHeader: []
      responses:
        '204':
          description: Session invalidated
  /auth/password/change:
    post:
      tags:
        - Auth
      operationId: changePassword
      summary: Change the current password
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordChangeRequest'
      responses:
        '200':
          description: Password changed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcknowledgementEnvelope'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
  /auth/password/policy:
    get:
      tags:
        - Auth
      operationId: getPasswordPolicy
      summary: Get active password policy
      description: Return backend-enforced password rules so clients can run a matching precheck before submitting a password.
      security: []
      responses:
        '200':
          description: Active password policy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordPolicyEnvelope'
        '404':
          $ref: '#/components/responses/NotFound'
  /auth/password/forgot:
    post:
      tags:
        - Auth
      operationId: startPasswordReset
      summary: Start the password reset flow
      description: Start a reset flow for a login-enabled email address. Clients should display a neutral confirmation message whether or not the account exists.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordForgotRequest'
      responses:
        '202':
          description: Reset flow accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcknowledgementEnvelope'
        '400':
          $ref: '#/components/responses/ValidationError'
  /auth/password/reset:
    post:
      tags:
        - Auth
      operationId: completePasswordReset
      summary: Complete the password reset flow
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetRequest'
      responses:
        '204':
          description: Password reset completed
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          $ref: '#/components/responses/Conflict'
  /auth/email/verify:
    post:
      tags:
        - Auth
      operationId: verifyEmailChallenge
      summary: Verify an email challenge and activate the related email
      description: Verify a registration or email-change challenge. This endpoint is intended for email-link or emailed-code completion flows.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailVerificationConfirmRequest'
      responses:
        '200':
          description: Email verified successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcknowledgementEnvelope'
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          $ref: '#/components/responses/Conflict'
  /auth/email/resend:
    post:
      tags:
        - Auth
      operationId: resendPrimaryEmailVerification
      summary: Resend a primary email verification challenge
      description: Start or resend a primary-account email verification challenge for registration or re-verification flows.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailVerificationResendRequest'
      responses:
        '202':
          description: Verification challenge accepted for delivery
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcknowledgementEnvelope'
        '400':
          $ref: '#/components/responses/ValidationError'
  /auth/mfa/verify:
    post:
      tags:
        - Auth
      operationId: verifyMfaChallenge
      summary: Verify an MFA challenge
      description: Complete a login challenge using TOTP or a recovery code.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MfaVerifyRequest'
      responses:
        '200':
          description: MFA verified and authenticated session issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSessionEnvelope'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /auth/passkeys/authentication/options:
    post:
      tags:
        - IdentitySecurity
      operationId: createPasskeyAuthenticationOptions
      summary: Create a WebAuthn authentication challenge
      description: Create a passkey authentication ceremony payload for the browser.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasskeyAuthenticationOptionsRequest'
      responses:
        '200':
          description: WebAuthn authentication options
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasskeyAuthenticationOptionsEnvelope'
  /auth/passkeys/authentication/verify:
    post:
      tags:
        - IdentitySecurity
      operationId: verifyPasskeyAuthentication
      summary: Verify a WebAuthn authentication result
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasskeyAuthenticationVerifyRequest'
      responses:
        '200':
          description: Passkey verified and authenticated session issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSessionEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /me:
    get:
      tags:
        - Users
      operationId: getMe
      summary: Get the current user profile
      description: Return the authenticated user's profile, roles, scopes, and current security summary.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
    patch:
      tags:
        - Users
      operationId: updateMe
      summary: Update the current user profile
      description: Update editable profile and presentation settings. Clients may send `If-Match` for optimistic concurrency.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfileUpdateRequest'
      responses:
        '200':
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileEnvelope'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '412':
          $ref: '#/components/responses/PreconditionFailed'
  /me/avatar:
    post:
      tags:
        - Users
      operationId: setAvatar
      summary: Attach a caller-owned file as the active avatar
      description: The referenced file must already belong to the caller and be valid for avatar use.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AvatarUpdateRequest'
      responses:
        '200':
          description: Updated profile with active avatar
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileEnvelope'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
    delete:
      tags:
        - Users
      operationId: removeAvatar
      summary: Remove the active avatar
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Updated profile without an avatar
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /me/account/deactivate:
    post:
      tags:
        - Users
      operationId: deactivateOwnAccount
      summary: Deactivate the current account
      description: Deactivate the signed-in account. This is intended for self-service deactivation and can be paired with a later deletion or privacy request workflow.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountDeactivateRequest'
      responses:
        '200':
          description: Account deactivated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcknowledgementEnvelope'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /files/uploads:
    post:
      tags:
        - Files
      operationId: createFileUploadIntent
      summary: Create a signed private file upload intent
      description: Create a signed upload intent for account-owned private files such as user avatars or generated export packages.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FileUploadIntentRequest'
      responses:
        '201':
          description: Upload intent created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileUploadIntentEnvelope'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'
  /files/uploads/{fileId}/complete:
    post:
      tags:
        - Files
      operationId: completeFileUpload
      summary: Finalize a signed file upload
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/FileIdPath'
      responses:
        '200':
          description: File metadata after successful upload completion
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileRecordEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /me/files/{fileId}:
    get:
      tags:
        - Files
      operationId: getOwnFile
      summary: Get metadata for one caller-owned file
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/FileIdPath'
      responses:
        '200':
          description: File metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileRecordEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /me/files/{fileId}/download:
    get:
      tags:
        - Files
      operationId: getOwnFileDownload
      summary: Get a short-lived signed download URL
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/FileIdPath'
      responses:
        '200':
          description: Signed download URL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileDownloadEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /me/sessions:
    get:
      tags:
        - IdentitySecurity
      operationId: listOwnSessions
      summary: List active sessions for the current account
      description: Return active and recently active sessions with device, IP, and last-seen metadata.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Session list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionListEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /me/sessions/revoke-all:
    post:
      tags:
        - IdentitySecurity
      operationId: revokeAllOwnSessions
      summary: Revoke all sessions for the current account
      description: Revoke all sessions or all sessions except the current one, depending on the requested scope.
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionBulkRevokeRequest'
      responses:
        '200':
          description: Sessions revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcknowledgementEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /me/sessions/{sessionId}:
    delete:
      tags:
        - IdentitySecurity
      operationId: revokeOwnSession
      summary: Revoke one session belonging to the current account
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/SessionIdPath'
      responses:
        '204':
          description: Session revoked
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /me/security:
    get:
      tags:
        - IdentitySecurity
      operationId: getMySecuritySummary
      summary: Get current security status
      description: Return summary state needed by an account security page, such as MFA enablement and passkey count.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Security summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSecuritySummaryEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /me/security/events:
    get:
      tags:
        - IdentitySecurity
      operationId: listOwnSecurityEvents
      summary: List recent security events for the current account
      description: Return recent login, MFA, password, and session events visible to the current account.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Security event list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SecurityEventListEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /me/security/reports:
    post:
      tags:
        - IdentitySecurity
      operationId: createOwnSecurityReport
      summary: Report suspicious login or account activity
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SecurityReportCreateRequest'
      responses:
        '201':
          description: Security report created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcknowledgementEnvelope'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /me/passkeys:
    get:
      tags:
        - IdentitySecurity
      operationId: listPasskeys
      summary: List registered passkeys
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Passkey list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasskeyListEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /me/passkeys/registration/options:
    post:
      tags:
        - IdentitySecurity
      operationId: createPasskeyRegistrationOptions
      summary: Create a WebAuthn registration challenge
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasskeyRegistrationOptionsRequest'
      responses:
        '200':
          description: WebAuthn registration options
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasskeyRegistrationOptionsEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /me/passkeys/registration/verify:
    post:
      tags:
        - IdentitySecurity
      operationId: verifyPasskeyRegistration
      summary: Verify a WebAuthn registration result
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasskeyRegistrationVerifyRequest'
      responses:
        '201':
          description: Passkey registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasskeyEnvelope'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /me/passkeys/{passkeyId}:
    delete:
      tags:
        - IdentitySecurity
      operationId: deletePasskey
      summary: Delete one registered passkey
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PasskeyIdPath'
      responses:
        '204':
          description: Passkey deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /me/mfa/totp/setup:
    post:
      tags:
        - IdentitySecurity
      operationId: createTotpSetup
      summary: Create a TOTP provisioning payload
      security:
        - bearerAuth: []
      responses:
        '200':
          description: TOTP secret and QR payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TotpSetupEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /me/mfa/totp/enable:
    post:
      tags:
        - IdentitySecurity
      operationId: enableTotp
      summary: Verify a TOTP code and enable MFA
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TotpEnableRequest'
      responses:
        '200':
          description: Updated security summary after enabling TOTP
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSecuritySummaryEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /me/mfa/totp/disable:
    post:
      tags:
        - IdentitySecurity
      operationId: disableTotp
      summary: Disable TOTP-based MFA
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerificationCodeRequest'
      responses:
        '200':
          description: Updated security summary after disabling TOTP
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSecuritySummaryEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /me/mfa/recovery-codes/rotate:
    post:
      tags:
        - IdentitySecurity
      operationId: rotateRecoveryCodes
      summary: Replace the current recovery code set
      security:
        - bearerAuth: []
      responses:
        '200':
          description: New recovery codes generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecoveryCodeListEnvelope'
