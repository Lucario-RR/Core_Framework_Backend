          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    refreshTokenCookie:
      type: apiKey
      in: cookie
      name: refresh_token
    csrfHeader:
      type: apiKey
      in: header
      name: X-CSRF-Token
  parameters:
    SearchQuery:
      name: query
      in: query
      required: false
      schema:
        type: string
        minLength: 1
        maxLength: 120
      example: alex@example.com
    Cursor:
      name: cursor
      in: query
      required: false
      schema:
        type: string
        minLength: 1
        maxLength: 256
      example: cur_eyJvZmZzZXQiOjIwfQ
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      example: 20
    StatusQuery:
      name: status
      in: query
      required: false
      schema:
        type: string
        enum:
          - pending
          - active
          - email_unverified
          - password_reset_required
          - suspended
          - frozen
          - deleted
      example: active
    RoleCodeQuery:
      name: role
      in: query
      required: false
      schema:
        type: string
        minLength: 1
        maxLength: 80
      example: admin
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 8
        maxLength: 200
      example: idem_20260402_001
    IfMatch:
      name: If-Match
      in: header
      required: false
      schema:
        type: string
      example: W/"rev-3"
    FileIdPath:
      name: fileId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Identifier'
    EmailIdPath:
      name: emailId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Identifier'
    PhoneIdPath:
      name: phoneId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Identifier'
    PasskeyIdPath:
      name: passkeyId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Identifier'
    SessionIdPath:
      name: sessionId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Identifier'
    PrivacyRequestIdPath:
      name: privacyRequestId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Identifier'
    AccountIdPath:
      name: accountId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Identifier'
    SettingKeyPath:
      name: settingKey
      in: path
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 120
      example: auth.password.min_length
  responses:
    ValidationError:
      description: Request validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          examples:
            default:
              value:
                error:
                  code: VALIDATION_ERROR
                  message: One or more fields are invalid.
                  urgencyLevel: 3
                  details:
                    field: email
                  requestId: req_01HZZZZZZZZZZ
    Unauthorized:
      description: Authentication is required or invalid
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          examples:
            default:
              value:
                error:
                  code: UNAUTHORIZED
                  message: Authentication is required.
                  urgencyLevel: 4
                  requestId: req_01HZZZZZZZZZZ
    Forbidden:
      description: The caller lacks permission for this action
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          examples:
            default:
              value:
                error:
                  code: FORBIDDEN
                  message: You do not have permission to perform this action.
                  urgencyLevel: 5
                  requestId: req_01HZZZZZZZZZZ
    NotFound:
      description: The requested resource does not exist
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          examples:
            default:
              value:
                error:
                  code: NOT_FOUND
                  message: Resource not found.
                  urgencyLevel: 2
                  requestId: req_01HZZZZZZZZZZ
    Conflict:
      description: The request conflicts with existing state
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          examples:
            default:
              value:
                error:
                  code: CONFLICT
                  message: The requested change conflicts with existing state.
                  urgencyLevel: 5
                  requestId: req_01HZZZZZZZZZZ
    RateLimited:
      description: Too many requests
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          examples:
            default:
              value:
                error:
                  code: RATE_LIMITED
                  message: Too many requests. Try again later.
                  urgencyLevel: 6
                  requestId: req_01HZZZZZZZZZZ
    PreconditionFailed:
      description: The resource changed and the precondition no longer matches
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          examples:
            default:
              value:
                error:
                  code: PRECONDITION_FAILED
                  message: The resource has been modified. Refresh and retry.
                  urgencyLevel: 4
                  requestId: req_01HZZZZZZZZZZ
  schemas:
    Identifier:
      type: string
      format: uuid
      example: 11111111-1111-4111-8111-111111111111
    CurrencyCode:
      type: string
      pattern: ^[A-Z]{3}$
      example: GBP
    ResponseMeta:
      type: object
      additionalProperties: false
      required:
        - requestId
      properties:
        requestId:
          type: string
          example: req_01HZZZZZZZZZZ
        nextCursor:
          type:
            - string
            - 'null'
          example: null
    ErrorObject:
      type: object
      additionalProperties: false
      required:
        - code
        - message
        - urgencyLevel
        - requestId
      properties:
        code:
          type: string
          example: VALIDATION_ERROR
        message:
          type: string
          example: One or more fields are invalid.
        urgencyLevel:
          type: integer
          minimum: 1
          maximum: 9
          description: |
            Integer urgency for the error response.
            Lower values are usually client-fixable request issues.
            Higher values indicate stronger security controls or backend/operator attention.
          example: 3
        details:
          type:
            - object
            - 'null'
          additionalProperties: true
        requestId:
          type: string
          example: req_01HZZZZZZZZZZ
    ErrorEnvelope:
      type: object
      additionalProperties: false
      required:
        - error
      properties:
        error:
          $ref: '#/components/schemas/ErrorObject'
    Acknowledgement:
      type: object
      additionalProperties: false
      required:
        - status
      properties:
        status:
          type: string
          example: ok
        message:
          type:
            - string
            - 'null'
          example: Operation completed successfully.
    AcknowledgementEnvelope:
      type: object
      additionalProperties: false
      required:
        - data
        - meta
      properties:
        data:
          $ref: '#/components/schemas/Acknowledgement'
        meta:
          $ref: '#/components/schemas/ResponseMeta'
    LegalDocumentAcceptance:
      type: object
      additionalProperties: false
      required:
        - documentKey
        - version
      properties:
        documentKey:
          type: string
          enum:
            - terms_of_service
            - privacy_policy
            - cookie_policy
          example: privacy_policy
        version:
          type: string
          example: '2026-04-01'
    RegisterRequest:
      type: object
      additionalProperties: false
      required:
        - email
        - password
        - displayName
        - acceptedLegalDocuments
      properties:
        username:
          type:
            - string
            - 'null'
          minLength: 3
          maxLength: 80
          pattern: ^[a-zA-Z0-9._-]+$
          example: alex
        email:
          type: string
          format: email
          example: alex@example.com
        password:
          type: string
          minLength: 12
          maxLength: 128
          example: StrongPassword!234
        displayName:
          type: string
          minLength: 2
          maxLength: 80
          example: Alex
        primaryPhone:
          type:
            - string
            - 'null'
          pattern: ^\+[1-9]\d{6,14}$
          example: '+447700900123'
        invitationCode:
          type:
            - string
            - 'null'
          example: inv_k1uYb5xTq9nA4pM2sR8cVQ
        acceptedLegalDocuments:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/LegalDocumentAcceptance'
    LoginRequest:
      type: object
      additionalProperties: false
      required:
        - password
      properties:
        login:
          description: Preferred login identifier; may be username, email, or login-enabled phone number.
          type:
            - string
            - 'null'
          example: alex@example.com
        email:
          description: Legacy email login field; use login for new clients.
          type: string
          format: email
          example: alex@example.com
        username:
          description: Legacy username login field; use login for new clients.
          type:
            - string
            - 'null'
          example: alex
        password:
          type: string
          minLength: 1
          maxLength: 128
          example: StrongPassword!234
        rememberMe:
          type: boolean
          example: true
    PasswordPolicy:
      type: object
      additionalProperties: false
      required:
        - minLength
        - requireLetter
        - requireNumber
        - requireSpecial
        - requireUppercase
        - requireLowercase
        - disallowUsername
        - disallowEmail
      properties:
        minLength:
          type: integer
          minimum: 1
          example: 12
        requireLetter:
          type: boolean
          example: true
        requireNumber:
          type: boolean
          example: true
        requireSpecial:
          type: boolean
          example: false
        requireUppercase:
          type: boolean
          example: false
        requireLowercase:
          type: boolean
          example: false
        disallowUsername:
          type: boolean
          example: true
        disallowEmail:
          type: boolean
          example: true
    PasswordPolicyEnvelope:
      type: object
      additionalProperties: false
      required:
        - data
        - meta
      properties:
        data:
          $ref: '#/components/schemas/PasswordPolicy'
        meta:
          $ref: '#/components/schemas/ResponseMeta'
    UserSecuritySummary:
      type: object
      additionalProperties: false
      required:
        - passwordSet
        - mustRotatePassword
        - emailVerified
        - primaryEmailVerified
        - primaryPhoneVerified
        - mfaEnabled
        - mfaRequired
        - totpEnabled
        - recoveryCodesAvailable
        - passkeyCount
        - enrolledFactors
      properties:
        passwordSet:
          type: boolean
          example: true
        mustRotatePassword:
          type: boolean
          example: false
        emailVerified:
          type: boolean
          example: true
        primaryEmailVerified:
          type: boolean
          example: true
        primaryPhoneVerified:
          type: boolean
          example: true
        mfaEnabled:
          type: boolean
          description: True when the account has at least one active MFA-capable credential, such as confirmed TOTP or a registered passkey.
          example: true
        mfaRequired:
          type: boolean
          description: Account-level MFA enrollment policy captured at account creation or by an admin update. This is a prompt signal, not a login blocker when no TOTP factor exists.
          example: false
        totpEnabled:
          type: boolean
          description: True when the account has an active confirmed TOTP factor. Password login returns a 202 MFA challenge only when this is true and a challenge factor is available.
          example: true
        recoveryCodesAvailable:
          type: boolean
          example: true
        passkeyCount:
          type: integer
          minimum: 0
          example: 2
        enrolledFactors:
          type: array
          items:
            type: string
            enum:
              - password
              - totp
              - passkey
              - recovery_code
          example:
            - password
            - totp
            - passkey
    UserSecuritySummaryEnvelope:
      type: object
      additionalProperties: false
      required:
        - data
        - meta
      properties:
        data:
          $ref: '#/components/schemas/UserSecuritySummary'
        meta:
          $ref: '#/components/schemas/ResponseMeta'
    UserProfile:
      type: object
      additionalProperties: false
      required:
        - id
        - status
        - primaryEmail
        - displayName
        - roles
        - scopes
        - defaultCurrency
        - locale
        - timezoneName
        - createdAt
        - security
      properties:
        id:
          $ref: '#/components/schemas/Identifier'
        username:
          type:
            - string
            - 'null'
          example: alex
        status:
          type: string
          enum:
            - pending
            - active
            - email_unverified
            - password_reset_required
            - suspended
            - frozen
            - deleted
          example: active
        primaryEmail:
          type: string
          format: email
          example: alex@example.com
        primaryPhone:
          type:
            - string
            - 'null'
          pattern: ^\+[1-9]\d{6,14}$
          example: '+447700900123'
        displayName:
          type: string
          example: Alex Pricewatch
        roles:
          type: array
          items:
            type: string
            enum:
              - user
              - admin
          example:
            - user
        scopes:
          type: array
          items:
            type: string
          example:
            - profile:read
            - profile:write
            - security:read
            - security:write
        defaultCurrency:
          $ref: '#/components/schemas/CurrencyCode'
        locale:
          type: string
          example: en-GB
        timezoneName:
          type: string
          example: Europe/London
        profileBio:
          type:
            - string
            - 'null'
          example: Security-conscious user and contributor.
        avatarFileId:
          type:
            - string
            - 'null'
          format: uuid
          example: null
        avatarFilename:
          type:
            - string
            - 'null'
          example: avatar.png
        emailCount:
          type: integer
          minimum: 1
          example: 2
        phoneCount:
          type: integer
          minimum: 0
          example: 1
        security:
          $ref: '#/components/schemas/UserSecuritySummary'
        createdAt:
          type: string
          format: date-time
          example: '2026-04-02T16:00:00Z'
    UserProfileEnvelope:
      type: object
      additionalProperties: false
      required:
        - data
        - meta
      properties:
        data:
          $ref: '#/components/schemas/UserProfile'
        meta:
          $ref: '#/components/schemas/ResponseMeta'
    AuthSession:
      type: object
      additionalProperties: false
      required:
        - accessToken
        - tokenType
        - expiresInSeconds
        - user
      properties:
        accessToken:
          type: string
          example: eyJhbGciOi...
        tokenType:
          type: string
          enum:
            - Bearer
          example: Bearer
        expiresInSeconds:
          type: integer
          minimum: 1
          example: 900
        user:
          $ref: '#/components/schemas/UserProfile'
    AuthSessionEnvelope:
      type: object
      additionalProperties: false
      required:
        - data
        - meta
      properties:
        data:
          $ref: '#/components/schemas/AuthSession'
        meta:
          $ref: '#/components/schemas/ResponseMeta'
    ProfileUpdateRequest:
      type: object
      additionalProperties: false
      properties:
        displayName:
          type: string
          minLength: 2
          maxLength: 80
          example: Alex Pricewatch
        defaultCurrency:
          $ref: '#/components/schemas/CurrencyCode'
        locale:
          type: string
          example: en-GB
        timezoneName:
          type: string
          example: Europe/London
        profileBio:
          type:
            - string
            - 'null'
          example: Track my account and security settings carefully.
    AvatarUpdateRequest:
      type: object
      additionalProperties: false
      required:
        - fileId
      properties:
        fileId:
          $ref: '#/components/schemas/Identifier'
    PasswordChangeRequest:
      type: object
      additionalProperties: false
      required:
        - currentPassword
        - newPassword
      properties:
        currentPassword:
          type: string
          minLength: 1
          maxLength: 128
          example: OldPassword!234
        newPassword:
          type: string
          minLength: 12
          maxLength: 128
          example: NewPassword!234
    PasswordForgotRequest:
      type: object
      additionalProperties: false
      required:
        - email
      properties:
        email:
          type: string
          format: email
          example: alex@example.com
    PasswordResetRequest:
      type: object
      additionalProperties: false
      required:
        - resetToken
        - newPassword
      properties:
        resetToken:
          type: string
          minLength: 20
          maxLength: 512
          example: reset_tok_abc123
        newPassword:
          type: string
          minLength: 12
          maxLength: 128
          example: FreshPassword!234
    MfaChallenge:
      type: object
      description: Returned from password login only when an existing confirmed TOTP factor must be verified.
      additionalProperties: false
      required:
        - challengeId
        - availableFactors
        - expiresAt
      properties:
        challengeId:
          $ref: '#/components/schemas/Identifier'
        availableFactors:
          type: array
          items:
            type: string
            enum:
              - totp
              - recovery_code
          example:
            - totp
            - recovery_code
        expiresAt:
          type: string
          format: date-time
          example: '2026-04-02T16:20:00Z'
    MfaChallengeEnvelope:
      type: object
      additionalProperties: false
      required:
        - data
        - meta
      properties:
        data:
          $ref: '#/components/schemas/MfaChallenge'
        meta:
          $ref: '#/components/schemas/ResponseMeta'
    MfaVerifyRequest:
      type: object
      additionalProperties: false
      required:
        - challengeId
        - factorType
      properties:
        challengeId:
          $ref: '#/components/schemas/Identifier'
        factorType:
          type: string
          enum:
            - totp
            - recovery_code
          example: totp
        code:
          type:
            - string
            - 'null'
          minLength: 6
          maxLength: 64
          example: '483920'
    Passkey:
      type: object
      additionalProperties: false
      required:
        - id
        - displayName
        - createdAt
      properties:
        id:
          $ref: '#/components/schemas/Identifier'
        displayName:
          type: string
          example: Alex MacBook Touch ID
        createdAt:
          type: string
          format: date-time
          example: '2026-04-02T16:00:00Z'
        lastUsedAt:
          type:
            - string
            - 'null'
          format: date-time
          example: '2026-04-03T08:20:00Z'
    PasskeyEnvelope:
      type: object
      additionalProperties: false
      required:
        - data
        - meta
      properties:
        data:
          $ref: '#/components/schemas/Passkey'
        meta:
          $ref: '#/components/schemas/ResponseMeta'
    PasskeyListEnvelope:
      type: object
      additionalProperties: false
      required:
        - data
        - meta
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Passkey'
        meta:
          $ref: '#/components/schemas/ResponseMeta'
    PasskeyRegistrationOptionsRequest:
      type: object
      additionalProperties: false
      properties:
        displayName:
          type: string
          minLength: 1
          maxLength: 120
          example: Alex iPhone Face ID
    WebAuthnPublicKeyOptions:
      type: object
      description: Opaque WebAuthn ceremony payload passed to browser APIs and returned for verification.
      additionalProperties: true
      example:
        challenge: ZXhhbXBsZS1jaGFsbGVuZ2U
        rp:
          name: Core User Management
        user:
          id: dXNlcl8x
          name: alex@example.com
          displayName: Alex
        pubKeyCredParams:
          - alg: -7
            type: public-key
    PasskeyRegistrationOptions:
      type: object
      additionalProperties: false
      required:
        - registrationId
        - publicKey
      properties:
        registrationId:
          $ref: '#/components/schemas/Identifier'
        publicKey:
          $ref: '#/components/schemas/WebAuthnPublicKeyOptions'
    PasskeyRegistrationOptionsEnvelope:
      type: object
      additionalProperties: false
      required:
        - data
        - meta
      properties:
        data:
          $ref: '#/components/schemas/PasskeyRegistrationOptions'
        meta:
          $ref: '#/components/schemas/ResponseMeta'
    PasskeyRegistrationVerifyRequest:
      type: object
      additionalProperties: false
      required:
        - registrationId
        - credential
      properties:
        registrationId:
          $ref: '#/components/schemas/Identifier'
        credential:
          type: object
          additionalProperties: true
          example:
            id: credential-id
            rawId: credential-id
            response:
              clientDataJSON: '...'
              attestationObject: '...'
            type: public-key
    PasskeyAuthenticationOptionsRequest:
      type: object
      additionalProperties: false
      properties:
        email:
          type:
            - string
            - 'null'
          format: email
          example: alex@example.com
    PasskeyAuthenticationOptions:
      type: object
      additionalProperties: false
      required:
        - authenticationId
        - publicKey
      properties:
        authenticationId:
          $ref: '#/components/schemas/Identifier'
        publicKey:
          $ref: '#/components/schemas/WebAuthnPublicKeyOptions'
    PasskeyAuthenticationOptionsEnvelope:
      type: object
      additionalProperties: false
      required:
        - data
        - meta
      properties:
        data:
          $ref: '#/components/schemas/PasskeyAuthenticationOptions'
        meta:
          $ref: '#/components/schemas/ResponseMeta'
    PasskeyAuthenticationVerifyRequest:
      type: object
      additionalProperties: false
      required:
        - authenticationId
        - credential
      properties:
        authenticationId:
          $ref: '#/components/schemas/Identifier'
        credential:
          type: object
          additionalProperties: true
          example:
            id: credential-id
            rawId: credential-id
            response:
              clientDataJSON: '...'
              authenticatorData: '...'
              signature: '...'
              userHandle: '...'
            type: public-key
    TotpSetup:
      type: object
      additionalProperties: false
      required:
        - secret
        - otpauthUri
        - qrCodeSvgDataUrl
      properties:
        secret:
          type: string
          example: JBSWY3DPEHPK3PXP
        otpauthUri:
          type: string
          example: otpauth://totp/CoreUserManagement:alex@example.com?secret=JBSWY3DPEHPK3PXP&issuer=CoreUserManagement
        qrCodeSvgDataUrl:
          type: string
          example: data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0c...
    TotpSetupEnvelope:
      type: object
      additionalProperties: false
      required:
        - data
        - meta
      properties:
        data:
          $ref: '#/components/schemas/TotpSetup'
        meta:
          $ref: '#/components/schemas/ResponseMeta'
    TotpEnableRequest:
      type: object
      additionalProperties: false
      required:
        - code
      properties:
        code:
          type: string
          minLength: 6
          maxLength: 8
          example: '483920'
    RecoveryCodeList:
      type: object
      additionalProperties: false
      required:
        - codes
      properties:
        codes:
          type: array
          minItems: 8
          maxItems: 12
          items:
            type: string
            example: A1C3-E5G7
    RecoveryCodeListEnvelope:
      type: object
      additionalProperties: false
      required:
        - data
        - meta
      properties:
        data:
          $ref: '#/components/schemas/RecoveryCodeList'
        meta:
          $ref: '#/components/schemas/ResponseMeta'
    VerificationCodeRequest:
      type: object
      additionalProperties: false
      required:
        - code
      properties:
        code:
          type: string
          minLength: 4
          maxLength: 16
          example: '483920'
    EmailAddress:
      type: object
      additionalProperties: false
      required:
        - id
        - email
        - label
        - isPrimary
        - isLoginEnabled
        - isVerified
        - createdAt
      properties:
        id:
          $ref: '#/components/schemas/Identifier'
        email:
          type: string
          format: email
          example: alex@example.com
        label:
          type: string
          enum:
            - primary
            - backup
            - billing
            - other
          example: primary
        isPrimary:
          type: boolean
          example: true
        isLoginEnabled:
          type: boolean
          example: true
        isVerified:
          type: boolean
          example: true
        createdAt:
          type: string
          format: date-time
          example: '2026-04-02T16:00:00Z'
    EmailAddressEnvelope:
      type: object
      additionalProperties: false
      required:
        - data
        - meta
      properties:
        data:
          $ref: '#/components/schemas/EmailAddress'
        meta:
