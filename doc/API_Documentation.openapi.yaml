        - occurredAt
      properties:
        id:
          $ref: '#/components/schemas/Identifier'
        eventType:
          type: string
          enum:
            - login_success
            - login_failure
            - password_changed
            - password_reset_requested
            - password_reset_completed
            - mfa_enabled
            - mfa_disabled
            - session_revoked
            - email_verified
            - suspicious_login_reported
          example: login_success
        severity:
          type: string
          enum:
            - low
            - medium
            - high
            - critical
          example: medium
        summary:
          type:
            - string
            - 'null'
          example: New successful login from a previously unseen device.
        ipAddress:
          type:
            - string
            - 'null'
          example: 203.0.113.10
        userAgent:
          type:
            - string
            - 'null'
          example: Mozilla/5.0
        deviceLabel:
          type:
            - string
            - 'null'
          example: Alex MacBook
        occurredAt:
          type: string
          format: date-time
          example: '2026-04-23T07:55:00Z'
