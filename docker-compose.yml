services:
  postgres:
    image: postgres:16
    container_name: core-framework-backend-postgres
    environment:
      POSTGRES_DB: core_framework_backend
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d core_framework_backend"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
